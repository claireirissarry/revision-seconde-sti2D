<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-cl d-cl">
  <title id="t-cl">Distributivité k(a+b) = ka + kb</title>
  <desc id="d-cl">Un grand rectangle d'aire k(a+b) se décompose en deux petits rectangles d'aires ka et kb.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <rect x="40" y="40" width="100" height="60" fill="#DCE6F7" stroke="#4A7BC9" stroke-width="2" />
  <rect x="140" y="40" width="60" height="60" fill="#FFD966" stroke="#2E2A24" stroke-width="2" />
  <text x="75" y="75" font-family="sans-serif" font-size="14" fill="#2E4F87">k·a</text>
  <text x="155" y="75" font-family="sans-serif" font-size="14" fill="#2E2A24">k·b</text>
  <text x="60" y="130" font-family="sans-serif" font-size="16" fill="#2E2A24">k(a + b) = k·a + k·b</text>
  <line x1="40" y1="150" x2="200" y2="150" stroke="#2E2A24" stroke-width="1" stroke-dasharray="4" />
  <text x="40" y="170" font-family="sans-serif" font-size="12" fill="#2E2A24">largeur totale = a + b</text>
</svg>
