<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-rp d-rp">
  <title id="t-rp">Repère orthonormé avec un point placé</title>
  <desc id="d-rp">Un point M de coordonnées (3 ; 2) est placé dans un repère, avec des pointillés menant à chaque axe.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="30" y1="190" x2="290" y2="190" stroke="#2E2A24" stroke-width="2" />
  <line x1="60" y1="20" x2="60" y2="210" stroke="#2E2A24" stroke-width="2" />
  <polygon points="290,190 280,185 280,195" fill="#2E2A24" />
  <polygon points="60,20 55,30 65,30" fill="#2E2A24" />
  <line x1="180" y1="190" x2="180" y2="90" stroke="#4A7BC9" stroke-width="1" stroke-dasharray="4" />
  <line x1="60" y1="90" x2="180" y2="90" stroke="#4A7BC9" stroke-width="1" stroke-dasharray="4" />
  <circle cx="180" cy="90" r="5" fill="#FF7F6B" />
  <text x="185" y="85" font-family="sans-serif" font-size="12" fill="#2E2A24">M (3 ; 2)</text>
  <text x="65" y="30" font-family="sans-serif" font-size="12" fill="#2E2A24">y</text>
  <text x="270" y="185" font-family="sans-serif" font-size="12" fill="#2E2A24">x</text>
</svg>
