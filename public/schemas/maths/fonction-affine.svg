<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titre-fa desc-fa">
  <title id="titre-fa">Représentation d'une fonction affine</title>
  <desc id="desc-fa">Droite représentant f(x) = a x + b, passant par le point (0, b), avec une pente positive a.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="20" y1="180" x2="300" y2="180" stroke="#2E2A24" stroke-width="2" />
  <line x1="40" y1="20" x2="40" y2="200" stroke="#2E2A24" stroke-width="2" />
  <polygon points="300,180 290,175 290,185" fill="#2E2A24" />
  <polygon points="40,20 35,30 45,30" fill="#2E2A24" />
  <line x1="40" y1="140" x2="260" y2="40" stroke="#4A7BC9" stroke-width="4" />
  <circle cx="40" cy="140" r="5" fill="#FF7F6B" />
  <text x="50" y="145" font-family="sans-serif" font-size="14" fill="#2E2A24">b</text>
  <text x="265" y="40" font-family="sans-serif" font-size="14" fill="#4A7BC9">a &gt; 0</text>
  <text x="150" y="210" font-family="sans-serif" font-size="12" fill="#2E2A24">x</text>
  <text x="20" y="30" font-family="sans-serif" font-size="12" fill="#2E2A24">f(x)</text>
</svg>
