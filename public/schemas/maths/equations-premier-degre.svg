<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-eq d-eq">
  <title id="t-eq">Balance à l'équilibre représentant une équation</title>
  <desc id="d-eq">Une balance équilibrée illustre l'égalité entre les deux côtés d'une équation.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="160" y1="40" x2="160" y2="160" stroke="#2E2A24" stroke-width="3" />
  <line x1="80" y1="70" x2="240" y2="70" stroke="#2E2A24" stroke-width="3" />
  <line x1="80" y1="70" x2="60" y2="120" stroke="#4A7BC9" stroke-width="2" />
  <line x1="80" y1="70" x2="100" y2="120" stroke="#4A7BC9" stroke-width="2" />
  <rect x="45" y="120" width="70" height="30" rx="6" fill="#DCE6F7" stroke="#4A7BC9" stroke-width="2" />
  <text x="60" y="140" font-family="sans-serif" font-size="14" fill="#2E4F87">x + 3</text>
  <line x1="240" y1="70" x2="220" y2="120" stroke="#4A7BC9" stroke-width="2" />
  <line x1="240" y1="70" x2="260" y2="120" stroke="#4A7BC9" stroke-width="2" />
  <rect x="205" y="120" width="70" height="30" rx="6" fill="#DCE6F7" stroke="#4A7BC9" stroke-width="2" />
  <text x="228" y="140" font-family="sans-serif" font-size="14" fill="#2E4F87">7</text>
  <polygon points="160,40 150,55 170,55" fill="#2E2A24" />
  <rect x="130" y="170" width="60" height="30" fill="#FFD966" />
  <text x="140" y="190" font-family="sans-serif" font-size="12" fill="#2E2A24">pied</text>
</svg>
