<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-stat d-stat">
  <title id="t-stat">Diagramme en bâtons avec la moyenne indiquée</title>
  <desc id="d-stat">Cinq barres de hauteurs différentes représentent une série statistique, avec une ligne pointillée pour la moyenne.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="30" y1="190" x2="290" y2="190" stroke="#2E2A24" stroke-width="2" />
  <rect x="50" y="120" width="30" height="70" fill="#4A7BC9" />
  <rect x="100" y="90" width="30" height="100" fill="#4A7BC9" />
  <rect x="150" y="140" width="30" height="50" fill="#4A7BC9" />
  <rect x="200" y="60" width="30" height="130" fill="#4A7BC9" />
  <rect x="250" y="110" width="30" height="80" fill="#4A7BC9" />
  <line x1="30" y1="115" x2="290" y2="115" stroke="#FF7F6B" stroke-width="2" stroke-dasharray="6" />
  <text x="235" y="108" font-family="sans-serif" font-size="12" fill="#FF7F6B">moyenne</text>
</svg>
