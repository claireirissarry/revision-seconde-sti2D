<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-in d-in">
  <title id="t-in">Droite graduée représentant la solution d'une inéquation</title>
  <desc id="d-in">Une portion colorée sur la droite graduée représente l'ensemble des solutions x supérieur à 2.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="30" y1="110" x2="290" y2="110" stroke="#2E2A24" stroke-width="2" />
  <polygon points="290,110 280,105 280,115" fill="#2E2A24" />
  <line x1="170" y1="110" x2="280" y2="110" stroke="#4A7BC9" stroke-width="6" />
  <circle cx="170" cy="110" r="6" fill="none" stroke="#4A7BC9" stroke-width="2" />
  <text x="160" y="135" font-family="sans-serif" font-size="14" fill="#2E2A24">2</text>
  <text x="60" y="90" font-family="sans-serif" font-size="14" fill="#2E4F87">x &gt; 2</text>
  <text x="0" y="115" font-family="sans-serif" font-size="12" fill="#2E2A24">-∞</text>
  <text x="295" y="115" font-family="sans-serif" font-size="12" fill="#2E2A24">+∞</text>
</svg>
