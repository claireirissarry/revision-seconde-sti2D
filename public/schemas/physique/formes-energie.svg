<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-nrj d-nrj">
  <title id="t-nrj">Conversion d'énergie potentielle en énergie cinétique</title>
  <desc id="d-nrj">Un objet en hauteur possède de l'énergie potentielle, qui se transforme en énergie cinétique pendant la chute.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="30" y1="180" x2="290" y2="180" stroke="#2E2A24" stroke-width="2" />
  <circle cx="70" cy="50" r="14" fill="#FFD966" stroke="#2E2A24" stroke-width="2" />
  <text x="30" y="35" font-family="sans-serif" font-size="11" fill="#2E2A24">énergie potentielle haute</text>
  <path d="M 70 65 C 90 100, 140 150, 220 165" fill="none" stroke="#4FA383" stroke-width="2" stroke-dasharray="5" />
  <circle cx="220" cy="166" r="14" fill="#FF7F6B" stroke="#2E2A24" stroke-width="2" />
  <text x="170" y="200" font-family="sans-serif" font-size="11" fill="#2E2A24">énergie cinétique haute</text>
</svg>
