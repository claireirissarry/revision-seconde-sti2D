<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-tc d-tc">
  <title id="t-tc">Réactifs transformés en produits</title>
  <desc id="d-tc">Deux cases de réactifs à gauche, une flèche de réaction, puis une case de produits à droite.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <rect x="20" y="70" width="70" height="70" fill="#DCF0E7" stroke="#4FA383" stroke-width="2" />
  <rect x="20" y="150" width="70" height="0" fill="none" />
  <rect x="20" y="150" width="0" height="0" />
  <text x="30" y="110" font-family="sans-serif" font-size="12" fill="#2F7259">Réactif A</text>
  <rect x="20" y="150" width="70" height="0" />
  <rect x="20" y="150" width="70" height="40" fill="#DCF0E7" stroke="#4FA383" stroke-width="2" />
  <text x="30" y="175" font-family="sans-serif" font-size="12" fill="#2F7259">Réactif B</text>
  <line x1="100" y1="110" x2="180" y2="110" stroke="#2E2A24" stroke-width="3" />
  <polygon points="180,110 168,103 168,117" fill="#2E2A24" />
  <text x="110" y="100" font-family="sans-serif" font-size="12" fill="#2E2A24">réaction</text>
  <rect x="200" y="80" width="100" height="70" fill="#FFD966" stroke="#2E2A24" stroke-width="2" />
  <text x="215" y="120" font-family="sans-serif" font-size="12" fill="#2E2A24">Produits</text>
</svg>
