<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-mvt d-mvt">
  <title id="t-mvt">Trajectoire d'un objet avec positions successives et vecteur vitesse</title>
  <desc id="d-mvt">Des points espacés régulièrement représentent la position d'un objet à intervalles de temps égaux, avec un vecteur vitesse.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <line x1="30" y1="150" x2="290" y2="90" stroke="#2E2A24" stroke-width="1" stroke-dasharray="4" />
  <circle cx="50" cy="146" r="6" fill="#4FA383" />
  <circle cx="110" cy="132" r="6" fill="#4FA383" />
  <circle cx="170" cy="118" r="6" fill="#4FA383" />
  <circle cx="230" cy="104" r="6" fill="#4FA383" />
  <line x1="230" y1="104" x2="280" y2="93" stroke="#FF7F6B" stroke-width="3" />
  <polygon points="280,93 268,90 270,100" fill="#FF7F6B" />
  <text x="240" y="80" font-family="sans-serif" font-size="12" fill="#FF7F6B">v</text>
</svg>
