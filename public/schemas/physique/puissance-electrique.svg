<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-pe d-pe">
  <title id="t-pe">Circuit électrique avec la formule de la puissance</title>
  <desc id="d-pe">Un circuit simple avec une résistance, la tension U et l'intensité I, et la formule P = U fois I à côté.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <rect x="40" y="80" width="180" height="40" fill="none" stroke="#2E2A24" stroke-width="2" />
  <line x1="40" y1="60" x2="40" y2="160" stroke="#2E2A24" stroke-width="2" />
  <line x1="220" y1="60" x2="220" y2="160" stroke="#2E2A24" stroke-width="2" />
  <line x1="40" y1="60" x2="220" y2="60" stroke="#2E2A24" stroke-width="2" />
  <line x1="40" y1="160" x2="220" y2="160" stroke="#2E2A24" stroke-width="2" />
  <rect x="80" y="85" width="80" height="30" fill="#FFD966" stroke="#2E2A24" stroke-width="2" />
  <text x="95" y="105" font-family="sans-serif" font-size="12" fill="#2E2A24">R</text>
  <text x="235" y="100" font-family="sans-serif" font-size="16" fill="#2F7259">P = U × I</text>
  <text x="235" y="120" font-family="sans-serif" font-size="11" fill="#2E2A24">(en watts)</text>
</svg>
