<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t-dus d-dus">
  <title id="t-dus">Les trois états de la matière : solide, liquide, gaz</title>
  <desc id="d-dus">Trois cases montrent des molécules serrées et ordonnées dans le solide, serrées et libres dans le liquide, très espacées dans le gaz.</desc>
  <rect width="320" height="220" fill="#FAF6EF" />
  <rect x="20" y="30" width="85" height="140" fill="#DCF0E7" stroke="#4FA383" stroke-width="2" />
  <rect x="117" y="30" width="85" height="140" fill="#DCF0E7" stroke="#4FA383" stroke-width="2" />
  <rect x="214" y="30" width="85" height="140" fill="#DCF0E7" stroke="#4FA383" stroke-width="2" />
  <g fill="#2F7259">
    <circle cx="40" cy="50" r="5" /><circle cx="60" cy="50" r="5" /><circle cx="80" cy="50" r="5" />
    <circle cx="40" cy="70" r="5" /><circle cx="60" cy="70" r="5" /><circle cx="80" cy="70" r="5" />
    <circle cx="40" cy="90" r="5" /><circle cx="60" cy="90" r="5" /><circle cx="80" cy="90" r="5" />
  </g>
  <g fill="#2F7259">
    <circle cx="135" cy="55" r="5" /><circle cx="155" cy="60" r="5" /><circle cx="175" cy="50" r="5" />
    <circle cx="140" cy="80" r="5" /><circle cx="165" cy="85" r="5" /><circle cx="185" cy="75" r="5" />
    <circle cx="150" cy="105" r="5" /><circle cx="130" cy="100" r="5" />
  </g>
  <g fill="#2F7259">
    <circle cx="230" cy="45" r="4" /><circle cx="280" cy="60" r="4" /><circle cx="250" cy="90" r="4" />
    <circle cx="290" cy="120" r="4" /><circle cx="225" cy="130" r="4" /><circle cx="265" cy="150" r="4" />
  </g>
  <text x="40" y="190" font-family="sans-serif" font-size="13" fill="#2E2A24">Solide</text>
  <text x="130" y="190" font-family="sans-serif" font-size="13" fill="#2E2A24">Liquide</text>
  <text x="230" y="190" font-family="sans-serif" font-size="13" fill="#2E2A24">Gaz</text>
</svg>
